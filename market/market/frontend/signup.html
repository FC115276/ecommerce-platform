<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>Marketplace</h1>
        <div class="links">
            <a href="index.html">Login</a>
        </div>
    </nav>
    <div class="auth-container">
        <div class="card">
            <h2>Create Account</h2>
            <form id="signupForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" class="form-control" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" class="form-control" required placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="regRole" class="form-control">
                        <option value="BUYER">Buyer</option>
                        <option value="SELLER">Seller</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            <p class="text-center mt-4 text-muted">Already have an account? <a href="index.html" class="link">Login</a></p>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
